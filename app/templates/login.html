{% extends "base.html" %}
{% import "components/ui.html" as ui %}

{% block title %}Login | Gestion Educativa{% endblock %}

{% block content %}
    {% call ui.login_card() %}
        <h1 class="mb-6 app-tech-title">Iniciar sesion</h1>
        <form method="post" class="space-y-4">
            <div>
                <label for="email" class="app-label mb-1 block">Correo</label>
                <input id="email" name="email" type="email" required class="app-input" autocomplete="username" />
            </div>
            <div>
                <label for="password" class="app-label mb-1 block">Contrasena</label>
                <input id="password" name="password" type="password" required class="app-input" autocomplete="current-password" />
            </div>
            <button type="submit" class="app-btn-primary w-full py-2.5">Entrar</button>
        </form>
    {% endcall %}
{% endblock %}
